name: MCP CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: ruff check src tests
      - run: black --check src tests
